name: tests

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }} / stable quality gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-stable-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-stable-composer-
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install Dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run Quality Gate
        run: composer ci

  lowest-dependencies:
    runs-on: ubuntu-latest

    name: PHP 8.2 / lowest dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-8.2-lowest-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-8.2-lowest-composer-
            ${{ runner.os }}-php-8.2-composer-

      - name: Validate Composer
        run: composer validate --strict

      - name: Install Lowest Dependencies
        run: composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run Tests
        run: composer test

      - name: Run Release Audit
        run: composer release:audit
